services:
  # ── Ollama (local LLM runtime) ──────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: mrcs_ollama
    environment:
      OLLAMA_NUM_THREAD: '16'         # use all vCPUs
      OLLAMA_FLASH_ATTENTION: '1'     # faster attention
      OLLAMA_MAX_LOADED_MODELS: '2'   # keep both models warm
      OLLAMA_NUM_PARALLEL: '2'        # 2 slots: one for background generation, one for interactive requests
    volumes:
      - ollama_data:/root/.ollama
    # Port not exposed publicly — backend accesses via internal Docker network
    restart: unless-stopped

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mrcs_backend
    env_file: .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - chroma_data:/app/chroma_db
      - kb_uploads:/app/knowledge_base
      - question_bank_data:/app/question_bank
    depends_on:
      - ollama
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 15s
      timeout: 5s
      retries: 5

  # ── React frontend (nginx) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mrcs_frontend
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - /etc/ssl/mrcs:/etc/ssl/mrcs:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ollama_data:
  chroma_data:
  kb_uploads:
  question_bank_data:
