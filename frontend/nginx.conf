# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name mrcs-revision.online www.mrcs-revision.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mrcs-revision.online www.mrcs-revision.online;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/ssl/mrcs/origin.crt;
    ssl_certificate_key /etc/ssl/mrcs/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Allow uploads up to 100 MB
    client_max_body_size 100M;

    # Proxy all /api/* requests to the FastAPI backend
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Allow up to 5 minutes for slow LLM responses
        proxy_read_timeout    300s;
        proxy_connect_timeout 30s;
        proxy_send_timeout    300s;
        # Required for SSE streaming
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
    }

    # React SPA: fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
